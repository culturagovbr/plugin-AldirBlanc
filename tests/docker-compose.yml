services:
  mapas:
    environment:
      # AbstractClient::$host/$token são propriedades tipadas (string, não-nullable) e são atribuídas
      # no construtor independente do modo — mesmo em modo "development" (fixture local, sem chamada
      # real), faltando essas envs o construtor quebra com TypeError. Valores fictícios: nunca usados
      # de fato, pois PNAB_CULTBR_MODE não é setado aqui e o default do Plugin é 'development'.
      - PNAB_CULTBR_HOST=http://cultbr.invalid
      - PNAB_CULTBR_TOKEN=fake-token-de-teste
      # Endpoint fictício para OportunidadeCultClient::create()/update() — apenas satisfaz o
      # guard `empty($endpoint)` antes de chamar post()/put(). Em modo 'development', o post()/put()
      # de AbstractClient faz short-circuit e retorna o payload sem nenhuma chamada HTTP.
      - PNAB_CULTBR_CREATE_OPORTUNIDADE_ENDPOINT=oportunidade/create
      - PNAB_CULTBR_UPDATE_OPORTUNIDADE_ENDPOINT=oportunidade/{id}/update
      # Delay de retry nulo causaria TypeError em enqueueOrReplaceJob (string typed, nullable config).
      # 'now' enfileira o retry imediatamente, permitindo testar o mecanismo sem aguardar intervalo.
      - ALDIRBLANC_INTEGRATION_RETRY_DELAY_JOB=now
      # TTL=0 expira itens de cache imediatamente em algumas implementações (Symfony Cache).
      # 3600 s garante que os itens de tentativa (attempt counter) persistam durante a execução dos testes.
      - ALDIRBLANC_INTEGRATION_CACHE_TTL=3600
    volumes:
      # Habilita o plugin AldirBlanc + tema Pnab na suíte de testes do repositório principal,
      # sem editar tests/config.d/ do core. "zz-aldirblanc.d" ordena depois de "config.d"
      # no glob de src/conf/config.php, então sobrescreve as chaves 'plugins' e 'themes.active'
      # (config.d/plugins.php e config.d/theme.php deste diretório). Plugin + tema são sempre
      # usados juntos aqui — uma única camada de override, sem variantes opcionais.
      # Caminho relativo ao cwd esperado do `docker compose` (tests/ do repo principal — ver README.md do plugin)
      # Monta o DIRETÓRIO (não o arquivo isolado) — bind mount de arquivo único dentro de outro
      # bind mount (../config:/var/www/config) falha no Docker Desktop/virtiofs (macOS) quando o
      # subdiretório de destino ainda não existe no host.
      - ../src/plugins/AldirBlanc/tests/config.d:/var/www/config/zz-aldirblanc.d

      # Testes do próprio plugin, montados como subpasta de /var/www/tests (mesmo destino de tests/src
      # do core, mapeado por tests/docker-compose.yml). O autoload PSR-4 'Tests\\' => '/var/www/tests'
      # (composer.json) resolve "Tests\AldirBlanc\SmokeTest" para /var/www/tests/AldirBlanc/SmokeTest.php,
      # então as classes deste plugin podem usar/estender Tests\Abstract\TestCase e Tests\Traits\* normalmente.
      - ../src/plugins/AldirBlanc/tests/src:/var/www/tests/AldirBlanc
